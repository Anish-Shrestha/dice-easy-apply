<div class="admin-container">
  <div class="admin-card">
    <h2>🛡️ Admin Panel</h2>

    <div class="tabs">
      <button [class.active]="activeTab === 'users'" (click)="switchTab('users')">👥 Users</button>
      <button [class.active]="activeTab === 'audit'" (click)="switchTab('audit')">📋 Audit Logs</button>
    </div>

    <!-- Users Tab -->
    <div *ngIf="activeTab === 'users'" class="tab-content">
      <div *ngIf="isLoadingUsers" class="loading">Loading users...</div>
      <table *ngIf="!isLoadingUsers && users.length > 0" class="data-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Role</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.email }}</td>
            <td><span class="badge" [class.admin]="user.role === 'admin'">{{ user.role }}</span></td>
            <td>{{ user.dateCreated | date:'short' }}</td>
          </tr>
        </tbody>
      </table>
      <p *ngIf="!isLoadingUsers && users.length === 0" class="empty">No users found.</p>
    </div>

    <!-- Audit Logs Tab -->
    <div *ngIf="activeTab === 'audit'" class="tab-content">
      <div *ngIf="isLoadingLogs" class="loading">Loading audit logs...</div>
      <table *ngIf="!isLoadingLogs && auditLogs.length > 0" class="data-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>User</th>
            <th>Action</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let log of auditLogs">
            <td class="nowrap">{{ log.timestamp | date:'short' }}</td>
            <td>{{ log.email }}</td>
            <td><span class="action-badge">{{ log.action }}</span></td>
            <td class="details-cell">{{ log.details }}</td>
          </tr>
        </tbody>
      </table>
      <p *ngIf="!isLoadingLogs && auditLogs.length === 0" class="empty">No audit logs found.</p>
    </div>
  </div>
</div>
