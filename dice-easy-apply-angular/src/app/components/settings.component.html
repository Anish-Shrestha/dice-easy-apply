<div class="settings-container">
  <div class="settings-card">
    <div class="settings-header">
      <h2>⚙️ Settings</h2>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>

    <div class="section">
      <h3>Account</h3>
      <div class="info-row">
        <span class="info-label">Email:</span>
        <span class="info-value">{{ userEmail }}</span>
      </div>
    </div>

    <div class="section">
      <h3>Resume</h3>
      <p class="section-desc">
        Upload your resume text. This will be used by AI for cover letter generation and job matching.
      </p>

      <div class="upload-row">
        <label class="file-upload-btn">
          📁 Upload .txt / .md file
          <input type="file" accept=".txt,.md,.text" (change)="onFileUpload($event)" hidden />
        </label>
      </div>

      <div *ngIf="isLoading" class="loading">Loading resume...</div>

      <textarea
        *ngIf="!isLoading"
        class="resume-textarea"
        [(ngModel)]="resume"
        placeholder="Paste your resume here or upload a file above..."
        rows="18"
      ></textarea>

      <div class="save-row">
        <button class="btn-save" (click)="saveResume()" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : '💾 Save Resume' }}
        </button>
        <span class="save-message" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'" *ngIf="message">
          {{ message }}
        </span>
      </div>
    </div>
  </div>
</div>
