<div class="app-shell" *ngIf="auth.isAuthenticated; else loginView">
  <!-- Side Menu -->
  <aside class="side-menu">
    <div class="side-brand">
      <h1>Dice Easy Apply</h1>
    </div>
    <nav class="side-nav">
      <a routerLink="/workflow" routerLinkActive="active-link">
        <span class="nav-icon">🚀</span> Workflow
      </a>
      <a routerLink="/jobs" routerLinkActive="active-link">
        <span class="nav-icon">📋</span> Jobs Grid
      </a>
      <a routerLink="/admin" routerLinkActive="active-link" *ngIf="auth.isAdmin">
        <span class="nav-icon">🛡️</span> Admin
      </a>
    </nav>
  </aside>

  <!-- Main Area -->
  <div class="main-area">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-spacer"></div>
      <div class="user-menu" (click)="toggleUserMenu()" (clickOutside)="closeUserMenu()">
        <button class="user-icon-btn" [title]="auth.userEmail">
          <span class="user-avatar">{{ auth.userEmail.charAt(0).toUpperCase() }}</span>
        </button>
        <div class="user-dropdown" *ngIf="showUserMenu">
          <div class="user-dropdown-header">
            <span class="user-dropdown-email">{{ auth.userEmail }}</span>
            <span class="user-dropdown-role">{{ auth.userRole }}</span>
          </div>
          <div class="user-dropdown-divider"></div>
          <a class="user-dropdown-item" routerLink="/settings" (click)="closeUserMenu()">⚙️ Settings</a>
          <button class="user-dropdown-item logout-item" (click)="onLogout()">🚪 Logout</button>
        </div>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<ng-template #loginView>
  <router-outlet></router-outlet>
</ng-template>
